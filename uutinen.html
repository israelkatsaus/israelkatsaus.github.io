<!DOCTYPE html>
<html lang="fi">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Uutinen</title>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="styles.css">

</head>

<body>

<div id="navbar"></div>

<div class="container">

<main class="article-container">

<div class="main-content" id="article"></div>

<aside class="sidebar">
<h3>Uusimmat uutiset</h3>
<div id="latest"></div>
</aside>

</main>

</div>

<div id="footer"></div>

<script src="script.js"></script>

<script>

/* ==============================
LOAD ARTICLE
============================== */

async function loadArticle(){

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if(!id){
document.getElementById("article").innerHTML =
"<p>Uutista ei löytynyt.</p>";
return;
}

try{

const res = await fetch("news.json");
const data = await res.json();

const article = data.articles.find(a => a.id == id);

if(!article){
document.getElementById("article").innerHTML =
"<p>Uutista ei löytynyt.</p>";
return;
}

document.getElementById("article").innerHTML = `

<div class="article-header">

<img src="${article.image}" alt="${article.title}">

<p class="category">${article.category || ""}</p>

<h1 class="article-title">${article.title}</h1>

<p class="article-meta">${article.date || ""}</p>

</div>

<div class="article-content">
${article.content}
</div>

<div class="article-source">
  <img src="assets/LOGO2.png" alt="Israel-katsaus">
  <span>Israel-katsaus</span>
</div>

`;

}catch(err){
console.error(err);
document.getElementById("article").innerHTML =
"<p>Virhe uutisen latauksessa.</p>";
}

}


/* ==============================
LATEST NEWS SIDEBAR
============================== */

async function loadLatest(){

try{

const res = await fetch("news.json");
const data = await res.json();

const latest = data.articles.slice(0,5);

document.getElementById("latest").innerHTML =
latest.map(a => `
<a class="sidebar-link" href="uutinen.html?id=${a.id}">
${a.title}
</a>
`).join("");

}catch(err){
console.error(err);
}

}


/* ==============================
INIT
============================== */

document.addEventListener("DOMContentLoaded", async () => {

await loadNavbar();
await loadFooter();

loadArticle();
loadLatest();

});

</script>

</body>
</html>
