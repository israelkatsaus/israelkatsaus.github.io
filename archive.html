<div id="news"></div>

<script>
fetch("news.json")
  .then(res => res.json())
  .then(news => {
    // järjestetään uusimmat ensin
    news.sort((a, b) => new Date(b.date) - new Date(a.date));

    document.getElementById("news").innerHTML =
      news.map(item => `
        <article>
          <h2><a href="${item.url}">${item.title}</a></h2>
          <p>${item.date}</p>
        </article>
      `).join("");
  });
</script>
