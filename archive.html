<!DOCTYPE html>
<html lang="fi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Uutisarkisto – kaikki artikkelit ja ajankohtaiset uutiset">

  <title>Uutisarkisto</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="styles.css">

  <style>
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      display: block;
      text-decoration: none;
      color: black;
      border: 1px solid #ddd;
      padding: 10px;
      border-radius: 10px;
      transition: transform 0.2s;
      background: #fff;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .card img {
      width: 100%;
      border-radius: 8px;
    }

    .card h2 {
      font-size: 19px;
      line-height: 1.2;
      margin: 8px 0;
    }

    .card p:nth-of-type(1) {
      font-size: 12px;
      color: #666;
      font-style: italic;
      opacity: 0.8;
    }

    .card p:nth-of-type(2) {
      font-size: 15px;
      line-height: 1.4;
      color: #444;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<div id="navbar"></div>

<!-- 🔥 OTSIKKO OIKEASSA PAIKASSA -->
<div class="container">

  <h1 class="archive-title">Uutisarkisto</h1>

  <!-- UUTISET -->
  <div id="archiveContainer" class="grid"></div>

</div>

<!-- FOOTER -->
<div id="footer"></div>

<!-- SCRIPT -->
<script src="script.js"></script>

</body>
</html>
