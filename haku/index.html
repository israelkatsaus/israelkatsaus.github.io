<body>

            <!-- Hampurilaispainike mobiilille -->

            <div class="nav-logo">
                <a href="/">
                    <img src="/images/logo.png" alt="Israel-katsaus" style="height: 50px; display: block;">
                </a>

            <!-- Mobiilin Facebook-logo (näkyy vain pienillä ruuduilla) -->

                <img src="/images/facebook.png" alt="Facebook" class="facebook-nav-icon">

            <!-- Oikean reunan linkit ja haku -->
            <div class="nav-center-right" id="nav-menu">

                    <a href="/">ETUSIVU</a>

                    <!-- Desktopin Facebook-logo (näkyy vain tietokoneella) -->

                </div>
            </div>
        </div>

    <!-- SIVUN VARSINAINEN SISÄLTÖ -->
    
<main class="content-wrapper container">
    <div class="search-page-layout" style="max-width: 800px; margin: 40px auto; min-height: 60px;">
        
        <h1 style="margin-bottom: 20px; font-size: 2rem; color: #333;">Hakutulokset</h1>
        
        <div id="search-results">
            <p style="color: #666;">Ladataan hakutuloksia...</p>
        </div>

    </div>
</main>

<script>
// Kun käyttäjä tekee haun, tämä funktio etsii osumat älykkäästi
function suoritaHaku(data, query) {
    if (!query) return [];
    
    const queryWords = query.toLowerCase().split(/\s+/).filter(word => word.length > 0);

    return data.map(uutinen => {
        let score = 0;
        
        const title = (uutinen.title || "").toLowerCase();
        const excerpt = (uutinen.excerpt || "").toLowerCase();
        const content = (uutinen.content || "").toLowerCase();

        // Lasketaan pisteet jokaiselle hakusanalle erikseen
        queryWords.forEach(word => {
            // 1. Osuma otsikossa (korkein paino: 10 pistettä)
            if (title.includes(word)) {
                score += 10;
                if (title.startsWith(word)) score += 5; // Lisäpisteet jos alkaa sanalla
            }
            
            // 2. Osuma ingressissä (keskitaso: 5 pistettä)
            if (excerpt.includes(word)) {
                score += 5;
            }
            
            // 3. Osuma leipätekstissä (matala paino: 1 piste per osuma)
            if (content.includes(word)) {
                const count = content.split(word).length - 1;
                score += count * 1; 
            }
        });

        return { ...uutinen, score };
    })
    // Otetaan vain ne uutiset, joista löytyi jotain
    .filter(uutinen => uutinen.score > 0)
    // Järjestetään pisteiden mukaan parhaat ensin
    .sort((a, b) => b.score - a.score);
}

const params = new URLSearchParams(window.location.search);
const hakusana = params.get('q') || ''; // Haetaan osoiteriviltä se ?q=hakusana

// Laitetaan hakusana näkyviin sivun otsikkoon
const otsikkoElementti = document.querySelector('h1');
if (otsikkoElementti && hakusana) {
    otsikkoElementti.textContent = `Hakutulokset sanalle: "${hakusana}"`;
}

if (hakusana) {
    // Ladataan se Eleventyn luoma JSON-tiedosto
    fetch('/haku-data.json')
        .then(response => response.json())
        .then(kaikkiUutiset => {
            // AJETAAN UUSI ÄLYKÄS HAKU:
            const tulokset = suoritaHaku(kaikkiUutiset, hakusana);
            
            // Etsitään elementti, johon tulokset tulostetaan
            const tulosAlue = document.getElementById('search-results');
            
            if (!tulosAlue) {
                console.error("Hups! Sivulta puuttuu <div id='search-results'></div> elementti.");
                return;
            }

            // Tyhjennetään "Ladataan..."-teksti
            tulosAlue.innerHTML = '';

            if (tulokset.length === 0) {
                tulosAlue.innerHTML = '<p>Ei hakutuloksia. Kokeile toisella hakusanalla.</p>';
                return;
            }

            // Tulostetaan tulokset näytölle järjestyksessä
            tulokset.forEach(uutinen => {
                const uutiskortti = document.createElement('div');
                uutiskortti.className = 'search-result-item';
                uutiskortti.style.marginBottom = '20px';

                uutiskortti.innerHTML = `
                    <span style="font-size: 0.85rem; color: #666;">${uutinen.date || ''}</span>
                    <h2 style="margin: 5px 0; font-size: 1.4rem;"><a href="${uutinen.url}" style="color: #0056b3; text-decoration: none;">${uutinen.title}</a></h2>
                    <p style="margin: 5px 0; color: #333; line-height: 1.4;">${uutinen.excerpt || (uutinen.content ? uutinen.content.substring(0, 150) + '...' : '')}</p>
                    <hr style="border: 0; border-top: 1px solid #eee; margin-top: 15px;">
                `;
                
                tulosAlue.appendChild(uutiskortti);
            });
        })
        .catch(virhe => {
            console.error("Virhe ladattaessa hakudataa:", virhe);
            document.getElementById('search-results').innerHTML = '<p>Haku epäonnistui teknisen virheen vuoksi.</p>';
        });
} else {
    // Jos tullaan hakusivulle ilman hakusanaa
    document.getElementById('search-results').innerHTML = '<p>Kirjoita hakusana yläpalkin hakukenttään.</p>';
}
</script>

            </div>

    <script>
    // Hakukentän toiminnallisuus (Enter-painallus)
    const navSearch = document.getElementById('search-input');
    if (navSearch) {
        navSearch.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const query = e.target.value.trim();
                if (query.length > 0) {
                    window.location.href = '/haku/?q=' + encodeURIComponent(query);
                }
            }
        });
    }

    // Mobiilivalikon avaaminen ja sulkeminen (Hampurilaisvalikko)
    const hamburgerBtn = document.getElementById('hamburger-btn');
    const navMenu = document.getElementById('nav-menu');

    if (hamburgerBtn && navMenu) {
        hamburgerBtn.addEventListener('click', function() {
            navMenu.classList.toggle('active');
        });
    }
    </script>
