<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Israel-katsaus</title>
    
    <!-- 1. Hakukonemielistelijä (Google-favicon) -->
    <!-- Google poimii tämän hakutuloksiin. Käytä tässä selkeää, värillistä versiota. -->
    <link rel="icon" type="image/png" href="assets/favicon-google.png" sizes="48x48">

    <!-- 2. Selaimen välilehden oletusikoni -->
    <!-- JavaScript (script.js) muuttaa tämän href-osoitetta lennosta Dark/Light-teeman mukaan -->
    <link rel="icon" type="image/png" href="assets/favicon-dark.png">

    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:ital,wght@0,400;0,700;1,700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Yläpalkki ladataan tähän kerran -->
    <div id="navbar-placeholder"></div>

    <!-- Tämän wrapperin sisältö vaihtuu dynaamisesti navigoidessa -->
    <main class="container content-wrapper">
        <div id="search-results-container" style="display:none;">
            <h2 class="section-title">Hakutulokset</h2>
            <div id="search-grid" class="archive-grid"></div>
            <hr>
        </div>

        <div id="front-page-layout">
            <div id="main-article-area"></div>
            <div id="side-articles-area" class="side-grid"></div>
        </div>
    </main>

    <!-- Alatunniste ladataan tähän -->
    <div id="footer-placeholder"></div>

    <script src="script.js"></script>
    <script>
        window.onload = () => {
            // Ladataan komponentit
            loadComponent('navbar-placeholder', 'navbar.html', () => {
                initNavbar();
                
                // Tarkistetaan heti latauksen jälkeen, onko URL:ssa hakusana
                const params = new URLSearchParams(window.location.search);
                const query = params.get('search');
                if (query) {
                    executeSearch(query);
                    // Täytetään hakukenttä näkyviin
                    const searchInput = document.getElementById('search-input');
                    if (searchInput) searchInput.value = query;
                } else {
                    renderFrontPage();
                }
            });
            
            loadComponent('footer-placeholder', 'footer.html');
        };
    </script>
</body>
</html>
