<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Suomalainen uutissivusto – ajankohtaiset uutiset, analyysit ja syväluotaukset.">
<title>Israel-katsaus</title>
<link href="https://fonts.googleapis.com/css2?family=Saira:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Gelasio:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<!-- NAVBAR -->
<div id="navbar"></div>

<!-- NEWS SECTION -->
<section class="news-wrapper">
  <div class="container">                    <!-- ← Lisätty tämä -->
    <div class="news-layout" id="newsContainer"></div>
  </div>
</section>

<!-- FOOTER -->
<div id="footer"></div>

<script>
/* LOAD MODUULEINA */
async function loadNavbar(){
  const res = await fetch("navbar.html");
  document.getElementById("navbar").innerHTML = await res.text();
}

async function loadFooter(){
  const res = await fetch("footer.html");
  document.getElementById("footer").innerHTML = await res.text();
}

/* MENU */
function toggleMenu(){
  const nav = document.getElementById("navLinks");
  if(nav) nav.classList.toggle("active");
}

function closeMenu(){
  const nav = document.getElementById("navLinks");
  if(nav) nav.classList.remove("active");
}

/* NEWS */
async function loadNews(){
  try{
    const response = await fetch("news.json");
    if(!response.ok) throw new Error("Uutisten lataus epäonnistui");
    
    const data = await response.json();
    const articles = (data && Array.isArray(data.articles))
      ? data.articles
          .filter(a => a.date)
          .sort((a,b) => new Date(b.date) - new Date(a.date))
      : [];

    const container = document.getElementById("newsContainer");
    if(!articles.length){
      container.innerHTML = "<p>Ei uutisia saatavilla.</p>";
      return;
    }

    const main = articles[0];
    let html = `
      <a href="uutinen.html?id=${main.id}" class="main-article">
        <img src="${main.image}" alt="${main.title}" loading="lazy">
        <div class="main-text">
          <h2>${main.title}</h2>
          <p>${main.excerpt}</p>
        </div>
      </a>
    `;

    html += `
      <div class="small-news">
        ${articles.slice(1,5).map(article => `
          <a href="uutinen.html?id=${article.id}" class="news-card">
            <img src="${article.image}" alt="${article.title}" loading="lazy">
            <h3>${article.title}</h3>
          </a>
        `).join("")}
      </div>
    `;

    container.innerHTML = html;
  } catch(err){
    console.error(err);
    document.getElementById("newsContainer").innerHTML = "<p>Virhe uutisten latauksessa.</p>";
  }
}

/* INIT */
document.addEventListener("DOMContentLoaded", () => {
  loadNavbar();
  loadFooter();
  loadNews();
});
</script>
</body>
</html>
