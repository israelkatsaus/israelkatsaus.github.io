<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Suomalainen uutissivusto – ajankohtaiset uutiset, analyysit ja syväluotaukset.">

<title>Uutissivusto</title>

<link href="https://fonts.googleapis.com/css2?family=Saira:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Gelasio:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap">
<link rel="stylesheet" href="styles.css">


<style>

*{box-sizing:border-box;}

:root{--primary:#0038b8;}

body{
margin:0;
font-family:"Gelasio",serif;
line-height:1.7;
color:#222;
background:#f8f9fa;
overflow-x:hidden;
}

img{max-width:100%;display:block;}

/* NAVBAR (moduuli) */

.navbar{
background:var(--primary);
position:sticky;
top:0;
z-index:1000;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.navbar-container{
max-width:1100px;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 20px;
}

.logo img{height:60px;}

.menu{
font-size:32px;
color:white;
cursor:pointer;
display:none;
background:none;
border:none;
}

.nav-links{
display:flex;
gap:25px;
}

.nav-links a{
color:white;
text-decoration:none;
padding:8px 14px;
font-weight:500;
transition:0.2s;
}

.nav-links a:hover{
background:rgba(255,255,255,0.15);
border-radius:4px;
}

/* NEWS */

.news-wrapper{
max-width:1200px;
margin:40px auto;
padding:0 20px;
}

.news-layout{
display:grid;
grid-template-columns:2fr 1fr 1fr 320px;
gap:24px;
}

.main-article{
grid-column:1;
grid-row:span 2;
text-decoration:none;
color:inherit;
display:block;
}

.main-article img{
width:100%;
height:420px;
object-fit:cover;
border-radius:8px;
}

.main-text h2{
margin:16px 0 10px;
font-size:2.1rem;
}

.main-text p{
color:#444;
font-size:1.05rem;
}

.small-news{
display:grid;
grid-template-columns:1fr 1fr;
gap:24px;
grid-column:2 / 4;
}

.news-card{
text-decoration:none;
color:inherit;
transition:transform 0.25s ease;
}

.news-card:hover{transform:translateY(-6px);}

.news-card img{
width:100%;
height:160px;
object-fit:cover;
border-radius:8px;
}

.news-card h3{
margin:12px 0 6px;
font-size:1.15rem;
}

/* MOBILE */

@media (max-width:768px){

.news-wrapper{
padding:0 14px;
margin:25px auto;
}

.news-layout{
grid-template-columns:1fr;
gap:18px;
}

/* pääuutinen */

.main-article img{
height:240px;
border-radius:6px;
}

.main-text h2{
font-size:1.5rem;
line-height:1.3;
}

.main-text p{
font-size:0.95rem;
}

/* pienet uutiset */

.small-news{
grid-template-columns:1fr;
gap:18px;
}

.news-card{
display:block;
}

.news-card img{
height:180px;
border-radius:6px;
}

.news-card h3{
font-size:1rem;
margin:10px 0;
line-height:1.35;
}

/* navbar */

.menu{
display:block;
}

.nav-links{
position:absolute;
top:78px;
left:0;
width:100%;
background:var(--primary);
flex-direction:column;
max-height:0;
overflow:hidden;
transition:max-height 0.4s ease;
}

.nav-links.active{
max-height:600px;
}

.nav-links a{
padding:16px 25px;
font-size:1.05rem;
}

}

</style>
</head>

<body>

<!-- NAVBAR -->
<div id="navbar"></div>

<section class="news-wrapper">
<div class="news-layout" id="newsContainer"></div>
</section>

<!-- FOOTER -->
<div id="footer"></div>

<script>

/* LOAD MODUULEINA */
async function loadNavbar(){
const res = await fetch("navbar.html");
document.getElementById("navbar").innerHTML = await res.text();
}

async function loadFooter(){
const res = await fetch("footer.html");
document.getElementById("footer").innerHTML = await res.text();
}

/* MENU */
function toggleMenu(){
const nav=document.getElementById("navLinks");
const overlay=document.getElementById("overlay");
const active=nav.classList.toggle("active");
overlay.classList.toggle("active",active);
}

function closeMenu(){
document.getElementById("navLinks").classList.remove("active");
document.getElementById("overlay").classList.remove("active");
}

/* NEWS */
async function loadNews(){

try{

const response = await fetch("news.json");
if(!response.ok) throw new Error("Uutisten lataus epäonnistui");

const data = await response.json();

const articles = (data.articles || [])
.sort((a,b)=> new Date(b.date) - new Date(a.date));

const container = document.getElementById("newsContainer");

if(!articles.length){
container.innerHTML = "<p>Ei uutisia saatavilla.</p>";
return;
}

const main = articles[0];

let html = `
<a href="uutinen${main.id}.html" class="main-article">
<img src="${main.image}" alt="${main.title}" loading="lazy">
<div class="main-text">
<h2>${main.title}</h2>
<p>${main.excerpt}</p>
</div>
</a>
`;

html += `
<div class="small-news">
${articles.slice(1,5).map(article => `
<a href="uutinen${article.id}.html" class="news-card">
<img src="${article.image}" alt="${article.title}" loading="lazy">
<h3>${article.title}</h3>
</a>
`).join("")}
</div>
`;

container.innerHTML = html;

}catch(err){
console.error(err);
document.getElementById("newsContainer").innerHTML =
"<p>Virhe uutisten latauksessa.</p>";
}

}

/* INIT */
document.addEventListener("DOMContentLoaded",()=>{
loadNavbar();
loadFooter();
loadNews();
});

</script>

</body>
</html>
