<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Israel Katsaus</title>
    
    <style>
        /* Yläpalkin tyylit */
        .navbar {
            background-color: #1a1a1a;     /* Tumma tausta */
            position: sticky;
            top: 0;
            width: 100%;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .navbar-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            height: 80px;
        }

        .navbar-logo {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .navbar-logo img {
            height: 55px;           /* Muuta tätä jos logo on liian iso/pieni */
            margin-right: 12px;
        }

        .navbar-links {
            display: flex;
            gap: 30px;
        }

        .navbar-links a {
            color: #ffffff;
            text-decoration: none;
            font-size: 1.1rem;
            transition: color 0.3s;
        }

        .navbar-links a:hover {
            color: #ffcc00;         /* Keltainen hover-efekti */
        }

        /* Mobiilivalikko */
        .menu-icon {
            display: none;
            font-size: 1.8rem;
            color: white;
            cursor: pointer;
        }

        @media screen and (max-width: 768px) {
            .navbar-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 80px;
                left: 0;
                width: 100%;
                background-color: #1a1a1a;
                padding: 20px 0;
            }
            
            .navbar-links.active {
                display: flex;
            }
            
            .menu-icon {
                display: block;
            }
        }
    </style>
</head>
<body>

    <!-- YLÄPARKKI -->
    <nav class="navbar">
        <div class="navbar-container">
            
            <!-- Logo + sivuston nimi -->
            <a href="index.html" class="navbar-logo">
                <img src="/assets/logo.png" alt="Israel Katsaus logo">
                Israel Katsaus
            </a>

            <!-- Navigaatiolinkit -->
            <div class="navbar-links" id="navLinks">
                <a href="index.html">Etusivu</a>
                <a href="uutiset.html">Uutiset</a>
                <a href="analyysit.html">Analyysit</a>
                <a href="yhteystiedot.html">Yhteystiedot</a>
            </div>

            <!-- Hampurilaisvalikko (mobiili) -->
            <div class="menu-icon" onclick="toggleMenu()">☰</div>
        </div>
    </nav>

    <!-- Tänne tulee sivun varsinainen sisältö -->
    <main style="max-width: 1200px; margin: 40px auto; padding: 0 20px;">
        <h1>Tervetuloa Israel Katsaukseen</h1>
        <p>Tässä on esimerkki etusivusta. Voit korvata tämän sisällön omallasi.</p>
    </main>

    <script>
        function toggleMenu() {
            const links = document.getElementById("navLinks");
            links.classList.toggle("active");
        }
    </script>
</body>
</html>
