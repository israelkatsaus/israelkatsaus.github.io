<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Israel Katsaus</title>

<style>
    html, body {
        margin: 0;
        padding: 0;
    }

    .navbar {
        background-color: #0038b8;
        position: sticky;
        top: 0;
        width: 100%;
        z-index: 1000;
        box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .navbar-container {
        position: relative;
        height: 100px;
        display: flex;
        align-items: center;
        padding: 0 30px;
    }

    /* Keskellä oleva päälogo */
    .navbar-logo {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
    }

    .navbar-logo img {
        height: 100px;
    }

    /* Linkit vasemmalla */
    .navbar-links {
        display: flex;
        gap: 20px;                    /* Linkkien väli */
    }

    .navbar-links a {
        color: #ffffff;
        text-decoration: none;
        font-size: 1.1rem;
        padding: 8px 16px;
        transition: color 0.3s;
    }

    .navbar-links a:hover {
        color: #ffcc00;
    }

    /* Oikea logo */
    .navbar-right-logo {
        position: absolute;
        right: 450px;
        top: 50%;
        transform: translateY(-50%);
    }

    .navbar-right-logo img {
        height: 50px;
        width: auto;
    }

    /* Hampurilaisvalikko */
    .menu-icon {
        display: none;
        font-size: 1.8rem;
        color: white;
        cursor: pointer;
        margin-left: auto;            /* Siirretään oikealle mobiilissa */
    }

    /* Mobiiliversio */
    @media screen and (max-width: 768px) {
        .navbar-container {
            padding: 0 20px;
        }

        .navbar-links {
            display: none;
            flex-direction: column;
            position: absolute;
            top: 100px;
            left: 0;
            width: 100%;
            background-color: #1a1a1a;
            padding: 20px 0;
        }

        .navbar-links.active {
            display: flex;
        }

        .navbar-links a {
            padding: 12px 25px;
            display: block;
            width: 100%;
        }

        .navbar-right-logo {
            display: none;               /* Piilotetaan oikea logo mobiilissa */
        }

        .menu-icon {
            display: block;
        }
    }
</style>
</head>
<body>

    <!-- YLÄPARKKI -->
    <nav class="navbar">
        <div class="navbar-container">
    
    <!-- Vasemmalla: Linkit -->
    <div class="navbar-links" id="navLinks">
        <a href="index.html">Etusivu</a>
        <a href="uutiset.html">Uutiset</a>
        <a href="analyysit.html">Analyysit</a>
        <a href="yhteystiedot.html">Yhteystiedot</a>
    </div>

    <!-- Keskellä: Päälogo -->
    <a href="index.html" class="navbar-logo">
        <img src="/assets/2.png" alt="Israel Katsaus logo">
    </a>

    <!-- Oikealla: Toinen logo -->
    <a href="#" class="navbar-right-logo">
        <img src="assets/logo5.png" alt="Oikea logo">
    </a>

    <!-- Hampurilaisvalikko -->
    <div class="menu-icon" onclick="toggleMenu()">☰</div>
</div>
    </nav>

    <!-- Tänne tulee sivun varsinainen sisältö -->
    <main style="max-width: 1200px; margin: 40px auto; padding: 0 20px;">
        <p>tulossa...</p>
    </main>

    <script>
        function toggleMenu() {
            const links = document.getElementById("navLinks");
            links.classList.toggle("active");
        }
    </script>
</body>
</html>
