<!DOCTYPE html>
<html lang="fi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Suomalainen uutissivusto – ajankohtaiset uutiset, analyysit ja syväluotaukset.">

<title>Israel-katsaus</title>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap">
  
<link rel="stylesheet" href="styles.css">

</head>

<body>

<div id="navbar"></div>

<section class="news-wrapper">
  <div class="container">
    <div class="news-layout" id="newsContainer"></div>
  </div>
</section>

<div id="footer"></div>

<script src="script.js"></script>

<script>
/* ============================
STABLE INIT (FIX NAV SHIFT)
============================ */

document.addEventListener("DOMContentLoaded", async () => {

  // 1. NAVBAR ENSIN (pakottaa layoutin vakautumaan)
  await loadNavbar();

  // 2. FOOTER
  await loadFooter();

  // 3. ODOTA YKSI RENDER CYCLE (tärkeä Chrome/Firefox fix)
  requestAnimationFrame(() => {
    loadNews();
  });

});
</script>

</body>
</html>
