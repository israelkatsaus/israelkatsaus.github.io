<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uutissivusto</title>
    <link href="https://fonts.googleapis.com/css2?family=Saira:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Gelasio:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap">
   
    <style>
        body {
            margin: 0;
            font-family: "Gelasio", serif;
            line-height: 1.65;
            color: #222;
        }
        /* NAVBAR */
        .navbar {
            background: #0038b8;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .navbar-container {
            max-width: 1200px;
            margin: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 20px;
        }
        .logo img {
            height: 65px;
        }
        .menu {
            font-size: 30px;
            color: white;
            cursor: pointer;
            display: none;
        }
        .nav-links {
            display: flex;
            gap: 20px;
        }
        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 8px 12px;
        }

        /* OVERLAY */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
            z-index: 900;
        }
        .overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* NEWS SECTION */
        .news-wrapper {
            max-width: 1200px;
            margin: auto;
            padding: 40px 20px;
        }
        .news-layout {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 300px;
            gap: 20px;
        }
        .main-article {
            grid-column: 1;
            grid-row: span 2;
            text-decoration: none;
            color: black;
        }
        .main-article img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 6px;
        }
        .main-text h2 {
            margin: 12px 0 8px 0;
            font-size: 28px;
        }

        .small-news {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            grid-column: 2 / 4;
            grid-row: span 2;
        }
        .news-card {
            text-decoration: none;
            color: black;
            transition: 0.2s;
        }
        .news-card img {
            width: 100%;
            height: 155px;
            object-fit: cover;
            border-radius: 6px;
        }
        .news-card:hover {
            transform: translateY(-3px);
        }

        .popular {
            grid-column: 4;
            grid-row: span 2;
            background: #f3f3f3;
            padding: 20px;
            border-radius: 6px;
            align-self: start;
        }
        .popular h3 {
            margin-top: 0;
        }
        .popular a {
            display: block;
            margin-bottom: 12px;
            text-decoration: none;
            color: black;
        }
        .popular a:hover {
            text-decoration: underline;
        }

        /* RESPONSIIVISUUS */
        @media (max-width: 992px) {
            .news-layout {
                grid-template-columns: 2fr 1fr 300px;
            }
            .small-news {
                grid-column: 2;
                grid-row: span 2;
            }
        }
        @media (max-width: 768px) {
            .news-layout {
                grid-template-columns: 1fr;
            }
            .main-article, .small-news, .popular {
                grid-column: 1;
                grid-row: auto;
            }
            .main-article img {
                height: 280px;
            }
            .menu {
                display: block;
            }
            .nav-links {
                position: absolute;
                top: 70px;
                left: 0;
                width: 100%;
                background: #0038b8;
                flex-direction: column;
                max-height: 0;
                overflow: hidden;
                transition: max-height 0.3s ease;
            }
            .nav-links.active {
                max-height: 500px;
            }
            .nav-links a {
                padding: 15px 20px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <div class="logo">
                <img src="/assets/LOGO2.png" alt="Logo">
            </div>
            <div class="menu" onclick="toggleMenu()">☰</div>
            <div class="nav-links" id="navLinks">
                <a href="#" onclick="closeMenu()">Etusivu</a>
                <a href="#" onclick="closeMenu()">Uutiset</a>
                <a href="#" onclick="closeMenu()">Analyysit</a>
                <a href="#" onclick="closeMenu()">Yhteystiedot</a>
            </div>
        </div>
    </nav>

    <section class="news-wrapper">
        <div class="news-layout" id="newsContainer">
            <!-- Kaikki uutiset generoidaan tähän JavaScriptillä -->
        </div>
    </section>

    <div class="overlay" id="overlay" onclick="closeMenu()"></div>

    <script>
        function toggleMenu() {
            const nav = document.getElementById("navLinks");
            const overlay = document.getElementById("overlay");
            const isActive = nav.classList.toggle("active");
            overlay.classList.toggle("active", isActive);
        }

        function closeMenu() {
            document.getElementById("navLinks").classList.remove("active");
            document.getElementById("overlay").classList.remove("active");
        }

        window.addEventListener("resize", () => {
            if (window.innerWidth > 768) closeMenu();
        });

        // Uutisten lataus
        async function loadNews() {
            try {
                const response = await fetch('news.json');
                if (!response.ok) throw new Error('Network response was not ok');
                
                const data = await response.json();
                const articles = data.articles.sort((a, b) => new Date(b.date) - new Date(a.date));

                const container = document.getElementById('newsContainer');
                container.innerHTML = '';

                if (articles.length === 0) {
                    container.innerHTML = '<p>Ei uutisia saatavilla.</p>';
                    return;
                }

                // Pääuutinen
                const main = articles[0];
                container.innerHTML += `
                    <a href="uutinen${main.id}.html" class="main-article">
                        <img src="${main.image}" alt="${main.title}">
                        <div class="main-text">
                            <h2>${main.title}</h2>
                            <p>${main.excerpt}</p>
                        </div>
                    </a>
                `;

                // Pienet uutiset (seuraavat 4)
                const smallNewsHTML = articles.slice(1, 5).map(article => `
                    <a href="uutinen${article.id}.html" class="news-card">
                        <img src="${article.image}" alt="${article.title}">
                        <h3>${article.title}</h3>
                    </a>
                `).join('');

                container.innerHTML += `<div class="small-news">${smallNewsHTML}</div>`;

                // Luetuimmat (seuraavat 5)
                const popularHTML = articles.slice(1, 6).map((article, index) => `
                    <a href="uutinen${article.id}.html">${index+1}. ${article.title}</a>
                `).join('');

                container.innerHTML += `
                    <aside class="popular">
                        <h3>Luetuimmat</h3>
                        ${popularHTML}
                    </aside>
                `;

            } catch (error) {
                console.error("Uutisten lataus epäonnistui:", error);
                document.getElementById('newsContainer').innerHTML = `
                    <p style="grid-column: 1 / -1; text-align: center; color: #c00;">
                        Virhe uutisten latauksessa. Tarkista, että news.json-tiedosto on olemassa.
                    </p>`;
            }
        }

        // Lataa uutiset sivun avautuessa
        window.onload = loadNews;
    </script>
</body>
</html>
