<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{margin:0;font-family:Arial;}

.navbar{
background:#0038b8;
color:white;
position:sticky;
top:0;
}

.navbar-container{
max-width:1200px;
margin:auto;
display:flex;
align-items:center;
justify-content:space-between;
padding:10px 20px;
}

.logo img{
height:60px;
}

.nav-links{
display:flex;
gap:20px;
}

.nav-links a{
color:white;
text-decoration:none;
font-size:18px;
}

.menu{
display:none;
font-size:28px;
cursor:pointer;
}

/* MOBILE */

@media (max-width:768px){

.nav-links{
display:none;
flex-direction:column;
width:100%;
background:#0038b8;
position:absolute;
left:0;
top:70px;
padding:15px 0;
}

.nav-links a{
padding:10px 20px;
}

.nav-links.active{
display:flex;
}

.menu{
display:block;
}

}

</style>
</head>

<body>

<nav class="navbar">
<div class="navbar-container">

<div class="logo">
<img src="/assets/2.png">
</div>

<div class="menu" onclick="toggleMenu()">☰</div>

<div class="nav-links" id="navLinks">
<a href="#">Etusivu</a>
<a href="#">Uutiset</a>
<a href="#">Analyysit</a>
<a href="#">Yhteystiedot</a>
</div>

</div>
</nav>

<script>
function toggleMenu(){
document.getElementById("navLinks").classList.toggle("active");
}
</script>

</body>
</html>
