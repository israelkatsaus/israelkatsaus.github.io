<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Israel Katsaus</title>

<style>
    html, body {
        margin: 0;
        padding: 0;
    }

    /* Yläpalkin tyylit */
    .navbar {
        background-color: #0038b8;
        position: sticky;
        top: 0;
        left: 0;
        right: 0;
        width: 100%;
        z-index: 1000;
        box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .navbar-container {
        position: relative;
        height: 100px;
        display: flex;
        align-items: center;
        padding: 0 30px;
    }

    /* Keskellä oleva päälogo */
    .navbar-logo {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
    }

    .navbar-logo img {
        height: 100px;
    }

    /* Navigaatiolinkit */
    .navbar-links {
        margin-left: auto;
        margin-right: 140px;           /* Tilaa oikealle logolle */
        display: flex;
        gap: 15px;
    }

    .navbar-links a {
        color: #ffffff;
        text-decoration: none;
        font-size: 1.1rem;
        padding: 8px 16px;
        transition: color 0.3s;
    }

    .navbar-links a:hover {
        color: #ffcc00;
    }

    /* Oikeassa reunassa oleva uusi logo */
    .navbar-right-logo {
        position: absolute;
        right: 30px;
        top: 50%;
        transform: translateY(-50%);
    }

    .navbar-right-logo img {
        height: 65px;                  /* Muuta tätä jos logo on liian iso/pieni */
        width: auto;
    }

    /* Hampurilaisvalikko */
    .menu-icon {
        display: none;
        font-size: 1.8rem;
        color: white;
        cursor: pointer;
    }

    /* Mobiiliversio */
    @media screen and (max-width: 768px) {
        .navbar-container {
            padding: 0 20px;
        }

        .navbar-links {
            display: none;
            flex-direction: column;
            position: absolute;
            top: 100px;
            left: 0;
            width: 100%;
            background-color: #1a1a1a;
            padding: 20px 0;
            margin-right: 0;
        }

        .navbar-links.active {
            display: flex;
        }

        .navbar-links a {
            color: #ffffff;
            text-decoration: none;
            padding: 12px 25px;
            display: block;
            width: 100%;
        }

        .navbar-links a:hover {
            color: #ffcc00;
            background-color: rgba(255, 204, 0, 0.15);
        }

        /* Piilotetaan oikea logo mobiilissa (näyttää siistimmältä) */
        .navbar-right-logo {
            display: none;
        }

        .menu-icon {
            display: block;
        }
    }
</style>
</head>
<body>

    <!-- YLÄPARKKI -->
    <nav class="navbar">
        <div class="navbar-container">
            
            <!-- Logo + sivuston nimi -->
            <a href="index.html" class="navbar-logo">
                <img src="/assets/2.png" alt="Israel Katsaus logo">
                
            </a>

            <!-- Navigaatiolinkit -->
            <div class="navbar-links" id="navLinks">
                <a href="index.html">Etusivu</a>
                <a href="uutiset.html">Uutiset</a>
                <a href="analyysit.html">Analyysit</a>
                <a href="yhteystiedot.html">Yhteystiedot</a>
            </div>
            <!-- OIKEA LOGO - Lisätään tähän -->
            <a href="#" class="navbar-right-logo">
                <img src="assets/logo4.png" alt="Oikea logo">
            </a>
            
            <!-- Hampurilaisvalikko (mobiili) -->
            <div class="menu-icon" onclick="toggleMenu()">☰</div>
        </div>
    </nav>

    <!-- Tänne tulee sivun varsinainen sisältö -->
    <main style="max-width: 1200px; margin: 40px auto; padding: 0 20px;">
        <p>tulossa...</p>
    </main>

    <script>
        function toggleMenu() {
            const links = document.getElementById("navLinks");
            links.classList.toggle("active");
        }
    </script>
</body>
</html>
