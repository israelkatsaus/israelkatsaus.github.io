<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Israel Katsaus</title>

<style>

html, body{
margin:0;
padding:0;
font-family: Arial, sans-serif;
}

.navbar{
background:#0038b8;
position:sticky;
top:0;
width:100%;
z-index:1000;
box-shadow:0 2px 8px rgba(0,0,0,0.3);
}

.navbar-container{
max-width:1200px;
margin:auto;
height:100px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
position:relative;
}

/* LOGO KESKELLÄ */

.navbar-logo{
position:absolute;
left:50%;
transform:translateX(-50%);
}

.navbar-logo img{
height:90px;
}

/* LINKIT */

.navbar-links{
display:flex;
gap:20px;
}

.navbar-links a{
color:white;
text-decoration:none;
font-size:1.1rem;
padding:10px 15px;
transition:0.3s;
}

.navbar-links a:hover{
color:#ffcc00;
}

/* OIKEA LOGO */

.navbar-right-logo img{
height:45px;
}

/* MENU IKONI */

.menu-icon{
display:none;
font-size:28px;
color:white;
cursor:pointer;
}

/* MOBILE */

@media screen and (max-width:768px){

.navbar-container{
max-width:1200px;
margin:auto;
height:80px;
display:flex;
align-items:center;
justify-content:space-between;
}

.navbar-logo{
position:static;
transform:none;
}

.navbar-logo img{
height:60px;
}

.navbar-links{
display:none;
flex-direction:column;
position:absolute;
top:80px;
left:0;
width:100%;
background:#0038b8;
padding:15px 0;
}

.navbar-links.active{
display:flex;
}

.navbar-links a{
padding:15px 25px;
}

.navbar-right-logo{
display:none;
}

.menu-icon{
display:block;
}

}

</style>
</head>

<body>

<nav class="navbar">
<div class="navbar-container">

<div class="navbar-links" id="navLinks">
<a href="index.html">Etusivu</a>
<a href="uutiset.html">Uutiset</a>
<a href="analyysit.html">Analyysit</a>
<a href="yhteystiedot.html">Yhteystiedot</a>
</div>

<a href="index.html" class="navbar-logo">
<img src="/assets/2.png">
</a>

<a href="#" class="navbar-right-logo">
<img src="assets/logo5.png">
</a>

<div class="menu-icon" onclick="toggleMenu()">☰</div>

</div>
</nav>

<main style="max-width:1200px;margin:40px auto;padding:20px;">
<p>Tulossa...</p>
</main>

<script>

function toggleMenu(){
const links=document.getElementById("navLinks");
links.classList.toggle("active");
}

</script>

</body>
</html>
